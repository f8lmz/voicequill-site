<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceQuill — Local AI voiceovers for Mac</title>
  <meta name="description" content="Studio-quality voiceovers, generated on your Mac. Fast, private, uniquely yours.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav" id="nav">
    <a href="#" class="nav-brand">
      <span class="voice">Voice</span><span class="quill">Quill</span>
    </a>
    <div class="nav-links">
      <a href="#features">Features</a>
      <a href="#pricing">Pricing</a>
      <a href="#faq">FAQ</a>
    </div>
  </nav>

  <main>

    <section class="hero">
      <h1 class="hero-wordmark">
        <span class="voice">Voice</span><span class="quill">Quill</span>
      </h1>

      <!--
        SUBHEAD A/B TEST POOL
        Currently active: A (Studio-quality)
        ─────────────────────────────────────────────────────
        A — Studio-quality, primary
           "Studio-quality audio, generated on your device."

        B — Keyword-rich, for paid search / cold IG
           "Local AI voiceovers for Mac. Studio-quality audio, generated on your device."

        C — Mechanical / direct (reserve)
           "Type a script. Pick a voice. Hit generate. Done — locally."

        D — Quality + privacy as twin lead (reserve)
           "Studio-quality voiceovers, generated on your Mac. Not in the cloud."
      -->
      <p class="hero-subhead">
        Studio-quality audio, generated on your device.
      </p>

      <p class="hero-tagline">Fast. Private. Uniquely yours.</p>

      <form class="waitlist" id="waitlist" novalidate>
        <!-- Web3Forms config -->
        <input type="hidden" name="access_key" value="0b94163f-ec1e-4e2a-b6ce-8b0b0ccb43fc">
        <input type="hidden" name="subject" value="VoiceQuill waitlist signup">
        <input type="hidden" name="from_name" value="VoiceQuill Waitlist">

        <!-- Honeypot spam protection — bots fill this in, humans don't see it -->
        <input type="checkbox" name="botcheck" class="hp-field" tabindex="-1" autocomplete="off">

        <!-- The actual email field -->
        <input
          type="email"
          name="email"
          class="waitlist-input"
          placeholder="your@email.com"
          required
          aria-label="Email address"
          autocomplete="email"
        >
        <button type="submit" class="waitlist-button">Join the waitlist</button>
      </form>

      <p class="hero-reassurance">
        Free during beta
        <span class="sep">·</span>
        No spam
        <span class="sep">·</span>
        Mac
        <span class="sep">·</span>
        Coming soon
      </p>
    </section>

  </main>

  <script>
    // ─── Nav border-on-scroll ───
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('is-scrolled', window.scrollY > 8);
    });

    // ─── Waitlist submission to Web3Forms ───
    const form = document.getElementById('waitlist');
    const input = form.querySelector('.waitlist-input');
    const button = form.querySelector('.waitlist-button');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = input.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        input.focus();
        return;
      }

      const originalLabel = button.textContent;
      button.textContent = 'Joining…';
      button.disabled = true;
      input.disabled = true;

      try {
        const formData = new FormData(form);
        const payload = Object.fromEntries(formData.entries());

        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        console.log('Web3Forms response:', data);

        if (data.success) {
          form.innerHTML = `
            <p class="waitlist-success">
              You're on the list. We'll be in touch.
            </p>
          `;
        } else {
          throw new Error(data.message || 'Submission failed');
        }
      } catch (err) {
        button.textContent = 'Try again';
        button.disabled = false;
        input.disabled = false;
        console.error('Waitlist error:', err);
      }
    });
  </script>

</body>
</html>
